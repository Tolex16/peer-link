<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--<link rel="manifest" href="/site.webmanifest" />  -->
    <meta name="theme-color" content="#0b1526" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- 🔑 SEO Essentials -->
    <title>Digi Cap Group | Portfolio Management</title>
    <meta
      name="description"
      content="Digi Cap Group helps you manage your portfolio securely"
    />
    <!-- Note: Google ignores meta keywords. Keep only if you want for minor engines. -->
    <!-- <meta name="keywords" content="crypto investment, bitcoin investment, ethereum ROI, BTC ETH investment, secure crypto platform, crypto portfolio, blockchain investment" /> -->
    <meta name="author" content="Digi Cap Group" />
    <link rel="canonical" href="https://digicapgroup.org/" />

    <!-- Crawl/Index controls -->
    <meta
      name="robots"
      content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1"
    />
    <meta name="googlebot" content="index,follow" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:site_name" content="Digi Cap Group" />
    <meta property="og:locale" content="en_NG" />
    <meta
      property="og:title"
      content="Digi Cap Group | Portfolio Management Platform"
    />
    <meta
      property="og:description"
      content="Manage your Portfolio with Digi Cap Group."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://digicapgroup.org/" />
    <meta
      property="og:image"
      content="https://digicapgroup.org/logo.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Digi Cap Group | Portfolio Management Platform"
    />
    <meta
      name="twitter:description"
      content="Grow your portfolio with Digi Cap Group. Manage multiple portfolios with us "
    />
    <meta
      name="twitter:image"
      content="https://digicapgroup.org/logo.png"
    />
    <!-- <meta name="twitter:site" content="@your_handle"> -->

    <!-- Performance hints (safe to remove if not applicable) -->
    <!-- Preconnect only if you actually use Google Fonts or other CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload your critical CSS if you have a single CSS file -->
    <!-- <link rel="preload" as="style" href="/assets/main.css" onload="this.onload=null;this.rel='stylesheet'"><noscript><link rel="stylesheet" href="/assets/main.css"></noscript> -->

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Digi Cap Group",
        "url": "https://digicapgroup.org/",
        "logo": "https://digicapgroup.org/icon.png",
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "contactType": "Customer Support",
            "email": "info@digicapgroup.org",
            "areaServed": "NG",
            "availableLanguage": ["en"]
          }
        ]
        /* , "sameAs": ["https://x.com/yourhandle","https://www.linkedin.com/company/yourcompany"] */
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Digi Asset Analytics",
        "url": "https://digicapgroup.org/",
        "inLanguage": "en"
        /* If you implement on-site search, uncomment this:
    , "potentialAction": {
      "@type": "SearchAction",
      "target": "https://digicapgroup.org/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    } */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
