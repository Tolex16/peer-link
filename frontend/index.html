<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- 🔥 SEO (SOCIAL MEDIA FOCUSED) -->
    <title>PeerLink | Connect, Share & Discover</title>

    <meta
      name="description"
      content="PeerLink is a social platform to connect with people, share moments, explore content, and build meaningful relationships."
    />

    <meta name="author" content="PeerLink" />
    <link rel="canonical" href="https://peerlink.app/" />

    <!-- 🔍 Crawling -->
    <meta name="robots" content="index,follow,max-image-preview:large" />

    <!-- 🔥 OPEN GRAPH (VERY IMPORTANT FOR SOCIAL APPS) -->
    <meta property="og:site_name" content="PeerLink" />
    <meta property="og:locale" content="en_NG" />

    <meta property="og:title" content="PeerLink | Connect with your world" />
    <meta
      property="og:description"
      content="Share moments, discover trends, connect with friends, and chat in real time."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://peerlink.app/" />

    <meta property="og:image" content="https://peerlink.app/preview.png" />

    <!-- 🐦 Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PeerLink | Connect, Share, Explore" />
    <meta
      name="twitter:description"
      content="Join PeerLink to share posts, chat with friends, and explore trending content."
    />
    <meta name="twitter:image" content="https://peerlink.app/preview.png" />

    <!-- ⚡ PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🔥 STRUCTURED DATA (SOCIAL PLATFORM STYLE) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SocialMediaPosting",
        "name": "PeerLink",
        "url": "https://peerlink.app/",
        "description": "A platform to connect, share and explore content with people around the world.",
        "publisher": {
          "@type": "Organization",
          "name": "PeerLink",
          "logo": {
            "@type": "ImageObject",
            "url": "https://peerlink.app/icon.png"
          }
        }
      }
    </script>

    <!-- 🔥 WEBSITE STRUCTURE -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PeerLink",
        "url": "https://peerlink.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://peerlink.app/explore?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
